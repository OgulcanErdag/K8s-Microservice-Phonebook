<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phonebook Application Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0f1117;
      --bg-card: #181a24;
      --bg-input: #1e2130;
      --border: #2a2d3e;
      --accent: #2dd4bf;
      --accent-glow: rgba(45, 212, 191, 0.15);
      --text-primary: #e8eaf0;
      --text-secondary: #8b8fa3;
      --text-muted: #5c6078;
      --red: #f87171;
      --red-hover: #fca5a5;
      --red-glow: rgba(248, 113, 113, 0.15);
      --green: #4ade80;
      --radius: 12px;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(45, 212, 191, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(45, 212, 191, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(248, 113, 113, 0.06), transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .container { width: 100%; max-width: 560px; position: relative; z-index: 1; animation: fadeUp 0.6s ease-out; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header { text-align: center; margin-bottom: 40px; }

    .logo-wrapper {
      display: inline-flex; align-items: center; gap: 12px;
      padding: 10px 20px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 50px; margin-bottom: 32px;
    }
    .logo-wrapper img { height: 36px; width: auto; }
    .logo-label {
      font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500;
      color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase;
    }

    .header h1 {
      font-size: 32px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px;
      background: linear-gradient(135deg, var(--text-primary), var(--red));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header .subtitle { font-size: 16px; color: var(--text-secondary); font-weight: 400; }
    .header .subtitle strong { color: var(--accent); font-weight: 600; }

    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px; margin-bottom: 24px;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
    }

    .card-title {
      font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 2px; color: var(--red);
      margin-bottom: 24px; display: flex; align-items: center; gap: 8px;
    }
    .card-title::before { content: '›'; font-size: 16px; }

    .form-group { margin-bottom: 20px; }

    .form-group label {
      display: block; font-size: 13px; font-weight: 500;
      color: var(--text-secondary); margin-bottom: 8px; letter-spacing: 0.3px;
    }

    .input-wrapper { position: relative; }

    .input-wrapper svg {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      width: 18px; height: 18px; color: var(--text-muted);
      pointer-events: none; transition: color 0.2s;
    }

    .form-input {
      width: 100%; padding: 14px 14px 14px 44px;
      background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text-primary); font-family: 'Outfit', sans-serif; font-size: 15px;
      outline: none; transition: border-color 0.25s, box-shadow 0.25s;
    }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input:focus { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-glow); }
    .input-wrapper:focus-within svg { color: var(--red); }

    .btn-delete {
      width: 100%; padding: 14px 24px; margin-top: 4px;
      background: var(--red); color: #fff;
      font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s; letter-spacing: 0.3px;
    }
    .btn-delete:hover { background: var(--red-hover); transform: translateY(-1px); box-shadow: 0 4px 20px var(--red-glow); }
    .btn-delete:active { transform: translateY(0); }
    .btn-delete svg { width: 18px; height: 18px; }

    .msg-warning {
      margin-top: 16px; padding: 12px 16px;
      background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.25);
      border-radius: 8px; color: var(--red); font-size: 14px; font-weight: 500;
      display: flex; align-items: center; gap: 8px;
    }
    .msg-warning::before { content: '⚠'; font-size: 16px; }

    .msg-success {
      margin-top: 16px; padding: 12px 16px;
      background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.25);
      border-radius: 8px; color: var(--green); font-size: 14px; font-weight: 500;
      display: flex; align-items: center; gap: 8px;
    }
    .msg-success::before { content: '✓'; font-size: 16px; }

    .footer { text-align: center; padding: 20px; font-size: 13px; color: var(--text-muted); line-height: 1.6; }
    .footer strong { color: var(--accent); font-weight: 500; }
    .tech-stack { display: inline-flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; justify-content: center; }
    .tag {
      font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 3px 10px;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; color: var(--text-secondary);
    }

    @media (max-width: 480px) {
      .header h1 { font-size: 24px; }
      .card { padding: 24px 20px; }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="header">
      <div class="logo-wrapper">
        <img src="https://www.docker.com/app/uploads/2019/09/docker-kubernetes.png" alt="Docker + Kubernetes" />
        <span class="logo-label">Cloud Native</span>
      </div>
      <h1>Phonebook Application</h1>
      <p class="subtitle">Welcome to <strong>{{ developer_name }}</strong>'s Phonebook</p>
    </div>

    <div class="card">
      <div class="card-title">Delete Contact</div>

      <form action="#" method="post">
        <div class="form-group">
          <label for="name">Name</label>
          <div class="input-wrapper">
            <input class="form-input" placeholder="Full Name" type="text" name="username" id="name" required autocomplete="off" />
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" /></svg>
          </div>
        </div>

        <button type="submit" class="btn-delete">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" /></svg>
          Delete
        </button>

        {% if not_valid %}
        <div class="msg-warning">{{ message }}</div>
        {% endif %}

        {% if show_result %}
        <div class="msg-success">{{ result }}</div>
        {% endif %}
      </form>
    </div>

    <div class="footer">
      Built by <strong>{{ developer_name }}</strong> &middot; Deployed with Flask on AWS CloudFormation
      <div class="tech-stack">
        <span class="tag">Python</span>
        <span class="tag">Flask</span>
        <span class="tag">Docker</span>
        <span class="tag">AWS</span>
      </div>
    </div>

  </div>
</body>
</html>
